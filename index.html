<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Imprint Mapping</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #cfe3f5;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
  // SCENE
  const scene = new THREE.Scene();

  // MISTY BLUE BACKGROUND
  scene.background = new THREE.Color(0xcfe3f5);

  // CAMERA
  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.z = 5;

  // RENDERER
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

   // LIGHTS
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
  directionalLight.position.set(2, 4, 5);
  scene.add(directionalLight);

      function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  // GLOWING LIGHT CORE
  const lightGroup = new THREE.Group();

  const coreGeometry = new THREE.SphereGeometry(0.22, 48, 48);
  const coreMaterial = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.95
  });
  const core = new THREE.Mesh(coreGeometry, coreMaterial);
  lightGroup.add(core);

  // OUTER HALO
  const haloGeometry = new THREE.SphereGeometry(0.42, 48, 48);
  const haloMaterial = new THREE.MeshBasicMaterial({
    color: 0xf4fbff,
    transparent: true,
    opacity: 0.18
  });
  const halo = new THREE.Mesh(haloGeometry, haloMaterial);
  lightGroup.add(halo);

  // SOFT PARTICLE AURA AROUND THE LIGHT
  const auraCount = 260;
  const auraPositions = new Float32Array(auraCount * 3);
  const auraBasePositions = new Float32Array(auraCount * 3);

  for (let i = 0; i < auraCount; i++) {
    const i3 = i * 3;

    const angle = Math.random() * Math.PI * 2;
    const radius = rand(0.18, 0.62);
    const spreadY = rand(-0.34, 0.34);

    const x = Math.cos(angle) * radius;
    const y = spreadY;
    const z = Math.sin(angle) * radius * 0.78;

    auraPositions[i3] = x;
    auraPositions[i3 + 1] = y;
    auraPositions[i3 + 2] = z;

    auraBasePositions[i3] = x;
    auraBasePositions[i3 + 1] = y;
    auraBasePositions[i3 + 2] = z;
  }

  const auraGeometry = new THREE.BufferGeometry();
  auraGeometry.setAttribute("position", new THREE.BufferAttribute(auraPositions, 3));

  const auraMaterial = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.032,
    transparent: true,
    opacity: 0.58,
    depthWrite: false
  });

  const aura = new THREE.Points(auraGeometry, auraMaterial);
  lightGroup.add(aura);

  lightGroup.position.set(0, 0.15, 0);
  scene.add(lightGroup);
  
   // ANIMATE LOOP
   function animate() {
    requestAnimationFrame(animate);

    const t = performance.now() * 0.001;

    // slow living pulse
    const pulse = 1 + Math.sin(t * 1.35) * 0.06;
    core.scale.setScalar(pulse);
    halo.scale.setScalar(1 + Math.sin(t * 1.1) * 0.1);

    core.material.opacity = 0.88 + Math.sin(t * 1.35) * 0.07;
    halo.material.opacity = 0.14 + Math.sin(t * 1.1) * 0.04;

    // soft hovering motion
    lightGroup.position.y = 0.15 + Math.sin(t * 0.7) * 0.035;

    // living aura motion
    const pos = aura.geometry.attributes.position.array;

    for (let i = 0; i < auraCount; i++) {
      const i3 = i * 3;

      const bx = auraBasePositions[i3];
      const by = auraBasePositions[i3 + 1];
      const bz = auraBasePositions[i3 + 2];

      pos[i3] =
        bx + Math.sin(t * 1.2 + i * 0.21) * 0.01;

      pos[i3 + 1] =
        by + Math.cos(t * 1.0 + i * 0.17) * 0.012;

      pos[i3 + 2] =
        bz + Math.sin(t * 1.15 + i * 0.19) * 0.01;
    }

    aura.geometry.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
  }

  animate();

  // RESIZE FIX
  window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
</script>

</body>
</html>
