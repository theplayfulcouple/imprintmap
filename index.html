<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Imprint Mapping</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #cfe3f5;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
  // SCENE
  const scene = new THREE.Scene();

  // MISTY BLUE BACKGROUND
  scene.background = new THREE.Color(0xcfe3f5);

  // CAMERA
  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.z = 5;

  // RENDERER
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

   // LIGHTS
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
  directionalLight.position.set(2, 4, 5);
  scene.add(directionalLight);

    // PARTICLE FIGURE
  const particleCount = 900;
  const positions = new Float32Array(particleCount * 3);
  const basePositions = new Float32Array(particleCount * 3);

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  for (let i = 0; i < particleCount; i++) {
    const i3 = i * 3;

    let x, y, z;

    // HEAD
    if (i < 160) {
      const angle = Math.random() * Math.PI * 2;
      const radius = Math.sqrt(Math.random()) * 0.28;
      x = Math.cos(angle) * radius;
      y = rand(0.8, 1.35);
      z = Math.sin(angle) * radius;
    }
    // UPPER BODY
    else if (i < 520) {
      x = rand(-0.28, 0.28);
      y = rand(-0.2, 0.9);
      z = rand(-0.18, 0.18);
    }
    // LOWER BODY
    else {
      x = rand(-0.18, 0.18);
      y = rand(-1.0, -0.2);
      z = rand(-0.14, 0.14);
    }

    positions[i3] = x;
    positions[i3 + 1] = y;
    positions[i3 + 2] = z;

    basePositions[i3] = x;
    basePositions[i3 + 1] = y;
    basePositions[i3 + 2] = z;
  }

  const figureGeometry = new THREE.BufferGeometry();
  figureGeometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

  const figureMaterial = new THREE.PointsMaterial({
    color: 0xf8fcff,
    size: 0.045,
    transparent: true,
    opacity: 0.78,
    depthWrite: false
  });

  const figure = new THREE.Points(figureGeometry, figureMaterial);
  figure.position.set(0, 0, 0);
  scene.add(figure);
   // ANIMATE LOOP
  function animate() {
    requestAnimationFrame(animate);

    const pos = figure.geometry.attributes.position.array;
    const t = performance.now() * 0.001;

    for (let i = 0; i < particleCount; i++) {
      const i3 = i * 3;

      pos[i3] =
        basePositions[i3] +
        Math.sin(t * 1.2 + i * 0.13) * 0.01;

      pos[i3 + 1] =
        basePositions[i3 + 1] +
        Math.cos(t * 1.0 + i * 0.09) * 0.012;

      pos[i3 + 2] =
        basePositions[i3 + 2] +
        Math.sin(t * 1.4 + i * 0.11) * 0.01;
    }

    figure.geometry.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
  }

  animate();

  // RESIZE FIX
  window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
</script>

</body>
</html>
