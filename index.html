<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Imprint Mapping</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #cfe3f5;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
  // SCENE
  const scene = new THREE.Scene();

  // MISTY BLUE BACKGROUND
  scene.background = new THREE.Color(0xcfe3f5);

  // CAMERA
  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.z = 5;

  // RENDERER
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

   // LIGHTS
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
  directionalLight.position.set(2, 4, 5);
  scene.add(directionalLight);

  // MATERIAL FOR FIGURE
  const figureMaterial = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    emissive: 0xddeeff,
    emissiveIntensity: 0.35,
    transparent: true,
    opacity: 0.92
  });

  // FIGURE GROUP
  const figure = new THREE.Group();

  // BODY
  const bodyGeometry = new THREE.CylinderGeometry(0.35, 0.35, 1.6, 32);
  const body = new THREE.Mesh(bodyGeometry, figureMaterial);
  figure.add(body);

  // HEAD
  const headGeometry = new THREE.SphereGeometry(0.32, 32, 32);
  const head = new THREE.Mesh(headGeometry, figureMaterial);
  head.position.y = 1.1;
  figure.add(head);

  // BASE / LOWER ROUNDING
  const baseGeometry = new THREE.SphereGeometry(0.38, 32, 32);
  const base = new THREE.Mesh(baseGeometry, figureMaterial);
  base.position.y = -0.8;
  base.scale.y = 0.55;
  figure.add(base);

  // FIGURE POSITION
  figure.position.set(0, 0, 0);
  scene.add(figure);

  // ANIMATE LOOP
  function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
  }

  animate();

  // RESIZE FIX
  window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
</script>

</body>
</html>
