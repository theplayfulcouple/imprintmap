<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Imprint Mapping</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #cfe3f5;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
  // SCENE
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xcfe3f5);

  // CAMERA
  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.set(0, 0.15, 4.6);

  // RENDERER
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // LIGHTS
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.95);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.45);
  directionalLight.position.set(2, 4, 5);
  scene.add(directionalLight);

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  // MAIN LIGHT GROUP
  const lightGroup = new THREE.Group();

  // CORE
  const coreGeometry = new THREE.SphereGeometry(0.28, 48, 48);
  const coreMaterial = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.96
  });
  const core = new THREE.Mesh(coreGeometry, coreMaterial);
  lightGroup.add(core);

  // INNER HALO
  const haloGeometry = new THREE.SphereGeometry(0.52, 48, 48);
  const haloMaterial = new THREE.MeshBasicMaterial({
    color: 0xf7fcff,
    transparent: true,
    opacity: 0.16
  });
  const halo = new THREE.Mesh(haloGeometry, haloMaterial);
  lightGroup.add(halo);

  // OUTER HALO
  const outerHaloGeometry = new THREE.SphereGeometry(0.82, 48, 48);
  const outerHaloMaterial = new THREE.MeshBasicMaterial({
    color: 0xf2f9ff,
    transparent: true,
    opacity: 0.07
  });
  const outerHalo = new THREE.Mesh(outerHaloGeometry, outerHaloMaterial);
  lightGroup.add(outerHalo);

  // SOFT HORIZONTAL MIST RING
  const ringGeometry = new THREE.RingGeometry(0.48, 0.95, 64);
  const ringMaterial = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.09,
    side: THREE.DoubleSide
  });
  const mistRing = new THREE.Mesh(ringGeometry, ringMaterial);
  mistRing.rotation.x = Math.PI / 2;
  mistRing.position.y = -0.02;
  lightGroup.add(mistRing);

  // PARTICLE AURA
  const auraCount = 420;
  const auraPositions = new Float32Array(auraCount * 3);
  const auraBasePositions = new Float32Array(auraCount * 3);

  for (let i = 0; i < auraCount; i++) {
    const i3 = i * 3;

    const angle = Math.random() * Math.PI * 2;
    const radius = rand(0.2, 0.95);
    const spreadY = rand(-0.55, 0.55);

    const x = Math.cos(angle) * radius;
    const y = spreadY;
    const z = Math.sin(angle) * radius * 0.82;

    auraPositions[i3] = x;
    auraPositions[i3 + 1] = y;
    auraPositions[i3 + 2] = z;

    auraBasePositions[i3] = x;
    auraBasePositions[i3 + 1] = y;
    auraBasePositions[i3 + 2] = z;
  }

  const auraGeometry = new THREE.BufferGeometry();
  auraGeometry.setAttribute(
    "position",
    new THREE.BufferAttribute(auraPositions, 3)
  );

  const auraMaterial = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.038,
    transparent: true,
    opacity: 0.42,
    depthWrite: false
  });

  const aura = new THREE.Points(auraGeometry, auraMaterial);
  lightGroup.add(aura);

  lightGroup.position.set(0, 0.1, 0);
  scene.add(lightGroup);

  // ANIMATION
  function animate() {
    requestAnimationFrame(animate);

    const t = performance.now() * 0.001;

    // breathing pulse
    const pulse = 1 + Math.sin(t * 1.15) * 0.07;
    const pulseSlow = 1 + Math.sin(t * 0.75) * 0.05;

    core.scale.setScalar(pulse);
    halo.scale.setScalar(1.02 + Math.sin(t * 1.0) * 0.09);
    outerHalo.scale.setScalar(1.02 + Math.sin(t * 0.7) * 0.12);

    core.material.opacity = 0.9 + Math.sin(t * 1.15) * 0.06;
    halo.material.opacity = 0.14 + Math.sin(t * 1.0) * 0.035;
    outerHalo.material.opacity = 0.06 + Math.sin(t * 0.7) * 0.02;

    mistRing.scale.set(pulseSlow, pulseSlow, pulseSlow);
    mistRing.material.opacity = 0.075 + Math.sin(t * 0.85) * 0.02;

    // gentle hover
    lightGroup.position.y = 0.1 + Math.sin(t * 0.55) * 0.045;

    // aura drift
    const pos = aura.geometry.attributes.position.array;

    for (let i = 0; i < auraCount; i++) {
      const i3 = i * 3;

      const bx = auraBasePositions[i3];
      const by = auraBasePositions[i3 + 1];
      const bz = auraBasePositions[i3 + 2];

      const distance = Math.sqrt(bx * bx + by * by + bz * bz);
      const influence = 1 + distance * 0.25;

      pos[i3] =
        bx + Math.sin(t * 1.0 + i * 0.17) * 0.012 * influence;

      pos[i3 + 1] =
        by + Math.cos(t * 0.9 + i * 0.13) * 0.014 * influence;

      pos[i3 + 2] =
        bz + Math.sin(t * 1.1 + i * 0.15) * 0.012 * influence;
    }

    aura.geometry.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
  }

  animate();

  // RESIZE FIX
  window.addEventListener("resize", () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
</script>

</body>
</html>
